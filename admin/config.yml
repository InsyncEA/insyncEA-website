backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Executive Assistant Tips"
          - "Calendar Strategy"
          - "Operations"
          - "Travel"
          - "Hiring"
          - "Tools"
          - "Mindset"
          - "Productivity"
      - label: "Featured Image"
        name: "thumbnail"
        widget: "image"
        required: false
      - label: "Short Description"
        name: "excerpt"
        widget: "text"
      - label: "Blog Content"
        name: "body"
        widget: "markdown"
      - label: "SEO Description"
        name: "seo_description"
        widget: "text"
        required: false

  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Homepage Content"
        name: "homepage"
        file: "_data/homepage.json"
        fields:
          - label: "Hero Eyebrow Text"
            name: "hero_eyebrow"
            widget: "string"
            hint: "Small text above the headline e.g. Executive Assistant · Operations Specialist"
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
            hint: "The main big headline on the homepage"
          - label: "Hero Subtext"
            name: "hero_subtext"
            widget: "text"
            hint: "The paragraph below the headline"
          - label: "Stats — Hours Saved"
            name: "stat_hours"
            widget: "string"
            default: "500+"
          - label: "Stats — Client Satisfaction"
            name: "stat_satisfaction"
            widget: "string"
            default: "98%"
          - label: "Stats — Clients Supported"
            name: "stat_clients"
            widget: "string"
            default: "15+"
          - label: "Featured Testimonial Quote"
            name: "testimonial_quote"
            widget: "text"
          - label: "Testimonial Attribution"
            name: "testimonial_attr"
            widget: "string"
            hint: "e.g. Founder, Elevate Studios"

  - name: "about"
    label: "About Page"
    files:
      - label: "About Content"
        name: "about"
        file: "_data/about.json"
        fields:
          - label: "Your Name or Title"
            name: "name"
            widget: "string"
            default: "InSyncEA"
          - label: "Your Role"
            name: "role"
            widget: "string"
            default: "Executive Assistant & Operations Specialist"
          - label: "Availability Status"
            name: "availability"
            widget: "string"
            default: "Currently accepting new clients"
          - label: "Bio Paragraph 1"
            name: "bio_1"
            widget: "text"
          - label: "Bio Paragraph 2"
            name: "bio_2"
            widget: "text"
          - label: "Bio Paragraph 3"
            name: "bio_3"
            widget: "text"
          - label: "Profile Photo"
            name: "photo"
            widget: "image"
            required: false
            hint: "Upload your profile photo here"

  - name: "services"
    label: "Services"
    folder: "_services"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Service Name"
        name: "title"
        widget: "string"
      - label: "Service Number"
        name: "order"
        widget: "number"
        hint: "e.g. 1, 2, 3 — controls the display order"
      - label: "Short Description"
        name: "description"
        widget: "text"
        hint: "The paragraph describing this service"
      - label: "What is included (one per line)"
        name: "includes"
        widget: "list"
        hint: "Add each bullet point as a separate item"
      - label: "Most Popular"
        name: "popular"
        widget: "boolean"
        default: false
        hint: "Turn on to show the Most Popular badge"

  - name: "testimonials"
    label: "Testimonials"
    folder: "_testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Client Name"
        name: "name"
        widget: "string"
      - label: "Client Role & Company"
        name: "role"
        widget: "string"
        hint: "e.g. CEO, Brooklyn Tea"
      - label: "Service Used"
        name: "service"
        widget: "string"
        hint: "e.g. Calendar Management"
      - label: "Testimonial Quote"
        name: "quote"
        widget: "text"
      - label: "Star Rating"
        name: "rating"
        widget: "select"
        options: ["5", "4", "3"]
        default: "5"

  - name: "contact"
    label: "Contact Details"
    files:
      - label: "Contact Info"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - label: "Email Address"
            name: "email"
            widget: "string"
          - label: "Location"
            name: "location"
            widget: "string"
            default: "Available Globally"
          - label: "LinkedIn URL"
            name: "linkedin"
            widget: "string"
          - label: "Response Time"
            name: "response_time"
            widget: "string"
            default: "Within 24 hours, always"
          - label: "Availability Message"
            name: "availability_message"
            widget: "text"
            hint: "The paragraph shown on the contact page"

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "settings"
        file: "_data/settings.json"
        fields:
          - label: "Business Name"
            name: "business_name"
            widget: "string"
            default: "InSyncEA"
          - label: "Tagline"
            name: "tagline"
            widget: "string"
            hint: "Short description shown in footer"
          - label: "Copyright Text"
            name: "copyright"
            widget: "string"
            default: "© 2025 InSyncEA. All rights reserved."
          - label: "Site Logo Text"
            name: "logo_text"
            widget: "string"
            default: "InSyncEA"
